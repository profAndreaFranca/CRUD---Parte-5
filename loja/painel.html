<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Painel de administração da loja virtual">
	<title>Loja Virtual - Painel Administrativo</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="painel.css">
</head>
<body>
	<header class="bg-dark text-white py-4 mb-4">
		<div class="container">
			<h1 class="mb-3">Painel Administrativo - Loja Virtual</h1>
			<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-0">
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav">
						<li class="nav-item"><a class="nav-link" href="#dashboard">Dashboard</a></li>
						<li class="nav-item"><a class="nav-link" href="#produtos">Produtos</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html">Loja</a></li>
					</ul>
				</div>
			</nav>
		</div>
	</header>

	<main class="container">
		<section id="dashboard" class="mb-5">
			<h2>Dashboard</h2>
			<div class="row">
				<div class="col-md-4">
					<div class="card bg-primary text-white">
						<div class="card-body">
							<h5 class="card-title">Total de Produtos</h5>
							<p class="card-text fs-4" id="total-produtos">0</p>
						</div>
					</div>
				</div>
			</div>
		</section>

		<section id="produtos" class="mb-5">
			<h2 class="mb-4">Gerenciar Produtos</h2>
            
			<!-- Formulário de Cadastro -->
			<div class="row mb-5">
				<div class="col-lg-6">
					<div class="card">
						<div class="card-header bg-success text-white">
							<h5 class="mb-0">Cadastrar Novo Produto</h5>
						</div>
						<div class="card-body">
							<form id="formProduto">
								<div class="mb-3">
									<label for="nome" class="form-label">Nome do Produto</label>
									<input type="text" class="form-control" id="nomeProduto" placeholder="Ex: Smartphone" required>
								</div>

								<div class="mb-3">
									<label for="descricao" class="form-label">Descrição</label>
									<textarea class="form-control" id="descricaoProduto" rows="3" placeholder="Descreva o produto..." required></textarea>
								</div>

								<div class="mb-3">
									<label for="preco" class="form-label">Preço (R$)</label>
									<input type="number" class="form-control" id="precoProduto" placeholder="0.00" step="0.01" min="0" required>
								</div>

								<div class="mb-3">
									<label for="categoria" class="form-label">Categoria</label>
									<select class="form-select" id="categoriaProduto" required>
										<option value="">Selecione uma categoria</option>
										<option value="smartphone">Smartphone</option>
										<option value="notebook">Notebook</option>
										<option value="tablet">Tablet</option>
										<option value="acessorios">Acessórios</option>
										<option value="perifericos">Periféricos</option>
										<option value="monitore">Monitor</option>
										<option value="audio">Áudio</option>
										<option value="rede">Rede</option>
										<option value="armazenamento">Armazenamento</option>
										<option value="impressora">Impressora</option>
										<option value="smartwatch">Smartwatch</option>
									</select>
								</div>

								<div class="mb-3">
									<label for="imagem" class="form-label">URL da Imagem</label>
									<input type="url" class="form-control" id="imagemProduto" placeholder="https://..." required>
								</div>

								<button type="submit" class="btn btn-success w-100" id="btnCadastrar">Cadastrar Produto</button>
								<button type="reset" class="btn btn-secondary w-100 mt-2" id="btnLimpar">Limpar Dados</button>
							</form>
						</div>
					</div>
				</div>

				<!-- Preview da Imagem -->
				<!-- <div class="col-lg-6">
					<div class="card">
						<div class="card-header bg-info text-white">
							<h5 class="mb-0">Pré-visualização</h5>
						</div>
						<div class="card-body text-center">
							<img id="previewImagem" src="https://source.unsplash.com/featured/300x300?product" alt="Pré-visualização" class="img-fluid mb-3" style="max-height: 300px;">
							<div id="previewInfo">
								<h6 id="previewNome">Nome do Produto</h6>
								<p id="previewDescricao" class="text-muted small">Descrição...</p>
								<h5 id="previewPreco" class="text-success">R$ 0,00</h5>
							</div>
						</div>
					</div>
				</div> -->
			</div>

			<!-- Lista de Produtos -->
			<div class="row">
				<div class="col-12">
					<h3 class="mb-4">Produtos Cadastrados</h3>
					<div id="lista-produtos" class="row">
						<!-- Produtos serão carregados aqui -->
					</div>
				</div>
			</div>
		</section>
	</main>

	<footer class="bg-dark text-white text-center py-4 mt-5">
		<div class="container">
			<p>&copy; 2026 Loja Virtual. Todos os direitos reservados.</p>
		</div>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="painel.js"></script>
	<script src="preview.js"></script>
</body>
</html>
